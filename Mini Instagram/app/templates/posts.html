<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Posts</title>

    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/posts.css">
</head>
<body>

<div class="page-wrapper">

    <div class="feed-container">

        <div class="posts-header">
            <h1>Community Posts</h1>
        </div>

        <div class="link-text" style="text-align:center; margin-bottom:20px;">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>

        <div id="postsContainer"></div>

    </div>

</div>

<script>
async function deletePost(postId) {
    const ok = confirm("Are you sure you want to delete this post?");
    if (!ok) return;

    try {
        const response = await fetch(`/posts/${postId}`, {
            method: "DELETE"
        });

        const data = await response.json();

        if (response.ok) {
            alert(data.message || "Post deleted successfully");
            loadPosts();
        } else {
            alert(data.detail || "Unable to delete post");
        }
    } catch {
        alert("Server error while deleting post");
    }
}

async function loadPosts() {
    const container = document.getElementById("postsContainer");

    container.innerHTML = "<p class='loading'>Loading posts...</p>";

    try {
        const response = await fetch("/posts");
        const data = await response.json();

        if (!response.ok) {
            container.innerHTML = "<p class='error'>Failed to load posts</p>";
            return;
        }

        if (data.length === 0) {
            container.innerHTML = "<p class='empty'>No posts yet. Be the first to post!</p>";
            return;
        }

        container.innerHTML = "";

        data.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px;">
                    <div class="post-user">@${post.username}</div>
                    <button
                        type="button"
                        onclick="deletePost(${post.id})"
                        style="background:#dc2626; color:white; border:none; padding:8px 14px; border-radius:10px; cursor:pointer; font-weight:600;">
                        Delete Post
                    </button>
                </div>
                <img src="/uploads/${post.image}" class="post-image">
                <div class="post-content">${post.content}</div>
            `;

            container.appendChild(card);
        });

    } catch {
        container.innerHTML = "<p class='error'>Server error</p>";
    }
}

loadPosts();
</script>

</body>
</html>
